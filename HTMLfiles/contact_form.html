<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .card {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 560px;
    }
    h2 {
      font-size: 18px;
      font-weight: 500;
      color: #111;
      margin-bottom: 0.25rem;
    }
    .subtitle {
      font-size: 14px;
      color: #666;
      margin-bottom: 1.5rem;
    }
    label {
      display: block;
      font-size: 13px;
      color: #555;
      margin-bottom: 6px;
    }
    .required { color: #e53e3e; }
    .field { margin-bottom: 1rem; }
    input[type="text"],
    input[type="email"],
    textarea {
      width: 100%;
      padding: 8px 12px;
      font-size: 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
    }
    input:focus, textarea:focus { border-color: #888; }
    textarea { resize: vertical; }
    .char-count {
      font-size: 12px;
      color: #999;
      text-align: right;
      margin-top: 4px;
    }
    .char-count.over { color: #e53e3e; }
    .error-msg {
      display: none;
      background: #fff5f5;
      border: 1px solid #feb2b2;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #c53030;
      margin-bottom: 1rem;
    }
    .btn-submit {
      width: 100%;
      padding: 10px;
      font-size: 15px;
      cursor: pointer;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 8px;
      transition: background 0.15s;
      font-family: inherit;
    }
    .btn-submit:hover { background: #f5f5f5; }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
    .success-wrap {
      display: none;
      text-align: center;
      padding: 2rem 0;
    }
    .success-icon {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: #f0fff4;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
    }
    .success-title {
      font-size: 16px;
      font-weight: 500;
      color: #111;
      margin-bottom: 0.5rem;
    }
    .success-body {
      font-size: 14px;
      color: #666;
      margin-bottom: 1.5rem;
      line-height: 1.6;
    }
    .btn-reset {
      font-size: 13px;
      cursor: pointer;
      padding: 8px 20px;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-family: inherit;
    }
    .btn-reset:hover { background: #f5f5f5; }
  </style>
</head>
<body>
<div class="card">
  <h2>お問い合わせ</h2>
  <p class="subtitle">ご質問・ご意見はこちらからお送りください。</p>

  <div id="form-body">
    <div class="field">
      <label>お名前 <span class="required">*</span></label>
      <input type="text" id="name" placeholder="山田 太郎">
    </div>
    <div class="field">
      <label>メールアドレス <span class="required">*</span></label>
      <input type="email" id="email" placeholder="taro@example.com">
    </div>
    <div class="field">
      <label>件名</label>
      <input type="text" id="subject" placeholder="お問い合わせの件名">
    </div>
    <div class="field" style="margin-bottom:1.5rem;">
      <label>お問い合わせ内容 <span class="required">*</span></label>
      <textarea id="message" rows="5" placeholder="ご質問・ご意見をご記入ください"></textarea>
      <div id="char-count" class="char-count">0 / 500文字</div>
    </div>

    <div id="error-msg" class="error-msg"></div>

    <button id="submit-btn" class="btn-submit" onclick="handleSubmit()">送信する</button>
  </div>

  <div id="success-msg" class="success-wrap">
    <div class="success-icon">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <path d="M5 11l4.5 4.5L17 7" stroke="#38a169" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <p class="success-title">送信が完了しました</p>
    <p class="success-body">お問い合わせありがとうございます。<br>内容を確認次第、ご連絡いたします。</p>
    <button onclick="resetForm()" class="btn-reset">新しいお問い合わせ</button>
  </div>
</div>

<script>
  const API_ENDPOINT = "https://owk15xpdx7.execute-api.us-east-1.amazonaws.com/prod/contact";
  const MAX = 500;
  const msgEl = document.getElementById('message');
  const countEl = document.getElementById('char-count');

  msgEl.addEventListener('input', () => {
    const len = msgEl.value.length;
    countEl.textContent = len + ' / ' + MAX + '文字';
    countEl.className = 'char-count' + (len > MAX ? ' over' : '');
  });

  async function handleSubmit() {
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const subject = document.getElementById('subject').value.trim();
    const message = document.getElementById('message').value.trim();
    const errEl = document.getElementById('error-msg');
    const btn = document.getElementById('submit-btn');

    errEl.style.display = 'none';

    if (!name || !email || !message) {
      errEl.textContent = '※ お名前・メールアドレス・お問い合わせ内容は必須項目です。';
      errEl.style.display = 'block';
      return;
    }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      errEl.textContent = '※ 正しいメールアドレスを入力してください。';
      errEl.style.display = 'block';
      return;
    }
    if (message.length > MAX) {
      errEl.textContent = '※ お問い合わせ内容は' + MAX + '文字以内で入力してください。';
      errEl.style.display = 'block';
      return;
    }

    btn.disabled = true;
    btn.textContent = '送信中...';

    try {
      const res = await fetch(API_ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, subject, message })
      });

      if (!res.ok) throw new Error('API error: ' + res.status);

      document.getElementById('form-body').style.display = 'none';
      document.getElementById('success-msg').style.display = 'block';
    } catch (e) {
      errEl.textContent = '※ 送信に失敗しました。しばらくしてから再度お試しください。';
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = '送信する';
    }
  }

  function resetForm() {
    ['name', 'email', 'subject', 'message'].forEach(id => {
      document.getElementById(id).value = '';
    });
    countEl.textContent = '0 / ' + MAX + '文字';
    countEl.className = 'char-count';
    document.getElementById('error-msg').style.display = 'none';
    document.getElementById('form-body').style.display = 'block';
    document.getElementById('success-msg').style.display = 'none';
    document.getElementById('submit-btn').disabled = false;
    document.getElementById('submit-btn').textContent = '送信する';
  }
</script>
</body>
</html>
